global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector internal metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Tempo metrics
  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics

  # Jaeger metrics
  - job_name: jaeger
    static_configs:
      - targets: ["jaeger:14269"]
    metrics_path: /metrics
