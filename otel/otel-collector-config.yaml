receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024

  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  # Add resource attributes for Strix traces
  resource:
    attributes:
      - key: service.namespace
        value: new-api
        action: upsert
      - key: deployment.environment
        value: selfhosted
        action: upsert

exporters:
  # Forward to Jaeger (OTLP gRPC)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Forward to Tempo (OTLP gRPC)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Forward logs to Loki via OTLP HTTP (Loki 3.x native OTLP support)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  # Internal metrics to Prometheus
  prometheus:
    endpoint: 0.0.0.0:8889

  # Debug logging (reduce in production)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/jaeger, otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
